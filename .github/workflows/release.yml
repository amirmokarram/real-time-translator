name: Release

# Build the Windows installer and publish it to a GitHub Release draft.
# Trigger by pushing a version tag, e.g.:
#   npm version 1.0.0        # bumps package.json + creates the tag
#   git push --follow-tags   # pushes the commit and the v1.0.0 tag
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required for electron-builder to create the release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish Windows installer
        run: npm run electron:build && npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
